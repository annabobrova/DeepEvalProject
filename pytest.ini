[pytest]
markers =
    happy_path: happy path test cases
    edge_case: edge case test cases
    negative: negative test cases
    ambiguous: ambiguous input test cases
    robustness: robustness test cases
    structured: structured output (JSON) test cases
    hallucination: RAG hallucination tests using resume as context
    technical: student-style questions for judge persona comparison
    injection: prompt injection resistance tests
